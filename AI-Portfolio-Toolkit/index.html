<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>AI Portfolio Pro Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/PptxGenJS@3.11.0/dist/pptxgen.bundle.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        .tab-active {
            border-color: #3b82f6;
            color: #60a5fa;
        }

        .tab-inactive {
            border-color: transparent;
            color: #94a3b8;
        }

        .tab-inactive:hover {
            color: #e2e8f0;
        }

        /* สไตล์สำหรับปุ่มวงกลมเลือกธีม */
        .theme-swatch {
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .theme-swatch:hover {
            transform: scale(1.15);
        }

        .theme-swatch.active {
            outline: 2px solid white;
            outline-offset: 2px;
            transform: scale(1.1);
        }
    </style>
</head>

<body class="bg-[#0f172a] text-white min-h-screen transition-all duration-500 relative">

    <div id="dynamic-bg"
        class="fixed inset-0 z-[-1] bg-cover bg-center bg-no-repeat transition-all duration-700 opacity-0 bg-blend-overlay bg-[#0f172a]/90">
    </div>
    <div id="theme-decorations" class="fixed inset-0 z-[0] pointer-events-none overflow-hidden"></div>

    <nav class="fixed top-6 right-6 z-50 flex items-center gap-3">

        <button onclick="toggleLang()" id="btn-lang"
            class="bg-slate-900/80 hover:bg-slate-800 text-white backdrop-blur-xl border border-white/10 w-11 h-11 rounded-full shadow-lg transition-all font-bold uppercase text-sm flex items-center justify-center">
            EN
        </button>

        <div
            class="bg-slate-900/80 backdrop-blur-xl border border-white/10 p-1 rounded-full flex shadow-lg items-center relative">
            <button onclick="setDirectLayout('portfolio')" id="btn-pill-portfolio"
                class="px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-wider transition-all bg-blue-600 text-white shadow-md">Portfolio</button>
            <button onclick="setDirectLayout('resume')" id="btn-pill-resume"
                class="px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-wider transition-all text-slate-400 hover:text-white">Resume</button>
        </div>

        <button onclick="toggleThemePanel()" id="btn-appearance"
            class="bg-slate-900/80 hover:bg-slate-800 text-white backdrop-blur-xl border border-white/10 w-11 h-11 rounded-full shadow-lg transition-all flex items-center justify-center group relative">
            <i data-lucide="palette" class="w-5 h-5 group-hover:scale-110 transition-transform"></i>
        </button>

        <button onclick="toggleModal()"
            class="bg-emerald-600/90 hover:bg-emerald-500 text-white backdrop-blur-xl border border-emerald-400/30 px-5 h-11 rounded-full font-bold shadow-lg transition-all flex items-center gap-2 group">
            <i data-lucide="settings" class="w-5 h-5 group-hover:rotate-90 transition-transform duration-300"></i>
            <span class="text-sm">Edit</span>
        </button>
    </nav>

    <div id="theme-panel"
        class="hidden fixed top-20 right-6 z-40 bg-[#0f172a]/95 backdrop-blur-2xl border border-slate-700 rounded-3xl p-5 shadow-[0_20px_50px_-12px_rgba(0,0,0,0.5)] w-72 origin-top-right transition-all">
        <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2"><i
                data-lucide="moon" class="w-3 h-3"></i> Appearance</h3>

        <div class="flex bg-slate-900 rounded-xl p-1 mb-6 border border-slate-800">
            <button onclick="setDirectColorMode('dark')" id="btn-mode-dark"
                class="flex-1 py-2 rounded-lg text-xs font-bold transition-all bg-slate-700 text-white flex items-center justify-center gap-2 shadow-md"><i
                    data-lucide="moon" class="w-3 h-3"></i> Dark</button>
            <button onclick="setDirectColorMode('light')" id="btn-mode-light"
                class="flex-1 py-2 rounded-lg text-xs font-bold transition-all text-slate-400 hover:text-white flex items-center justify-center gap-2"><i
                    data-lucide="sun" class="w-3 h-3"></i> Light</button>
        </div>

        <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3 flex items-center gap-2"><i
                data-lucide="swatch-book" class="w-3 h-3"></i> Color Theme</h3>

        <div class="grid grid-cols-4 gap-3">
            <div onclick="setDirectTheme('tech')" id="swatch-tech"
                class="theme-swatch w-10 h-10 rounded-full bg-blue-500 shadow-[0_0_10px_rgba(59,130,246,0.5)] active mx-auto"
                title="Tech & Startup"></div>
            <div onclick="setDirectTheme('educ')" id="swatch-educ"
                class="theme-swatch w-10 h-10 rounded-full bg-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.5)] mx-auto"
                title="Education"></div>
            <div onclick="setDirectTheme('gov')" id="swatch-gov"
                class="theme-swatch w-10 h-10 rounded-full bg-amber-500 shadow-[0_0_10px_rgba(245,158,11,0.5)] mx-auto"
                title="Government"></div>
            <div onclick="setDirectTheme('creative')" id="swatch-creative"
                class="theme-swatch w-10 h-10 rounded-full bg-fuchsia-500 shadow-[0_0_10px_rgba(217,70,239,0.5)] mx-auto"
                title="Creative"></div>
            <div onclick="setDirectTheme('minimal')" id="swatch-minimal"
                class="theme-swatch w-10 h-10 rounded-full bg-white shadow-[0_0_10px_rgba(255,255,255,0.5)] mx-auto"
                title="Minimal"></div>
            <div onclick="setDirectTheme('eco')" id="swatch-eco"
                class="theme-swatch w-10 h-10 rounded-full bg-teal-500 shadow-[0_0_10px_rgba(20,184,166,0.5)] mx-auto"
                title="Eco Nature"></div>
            <div onclick="setDirectTheme('bold')" id="swatch-bold"
                class="theme-swatch w-10 h-10 rounded-full bg-rose-500 shadow-[0_0_10px_rgba(244,63,94,0.5)] mx-auto"
                title="Bold Passion"></div>
            <div onclick="setDirectTheme('luxury')" id="swatch-luxury"
                class="theme-swatch w-10 h-10 rounded-full bg-gradient-to-br from-amber-300 to-indigo-900 shadow-[0_0_10px_rgba(251,191,36,0.5)] mx-auto"
                title="Luxury"></div>
        </div>
    </div>

    <div id="app" class="container mx-auto py-20 px-6"></div>

    <div id="edit-modal"
        class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[100] hidden items-center justify-center p-4">
        <div
            class="bg-[#0f172a] text-white w-full max-w-5xl rounded-3xl border border-slate-700 shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">

            <div class="px-8 py-6 border-b border-slate-800 flex justify-between items-center bg-slate-900/50">
                <h2 class="text-2xl font-bold flex items-center gap-3"><i data-lucide="user-cog"
                        class="w-7 h-7 text-blue-400"></i> Manage Profile (Bilingual)</h2>
                <button onclick="toggleModal()" class="text-slate-400 hover:text-white transition-colors"><i
                        data-lucide="x" class="w-7 h-7"></i></button>
            </div>

            <div class="flex px-8 pt-4 gap-8 border-b border-slate-800 bg-[#0f172a]">
                <button onclick="switchTab('basic')" id="tab-basic"
                    class="tab-active pb-3 border-b-2 font-medium flex items-center gap-2 transition-all"><i
                        data-lucide="user" class="w-4 h-4"></i> Basic Info</button>
                <button onclick="switchTab('contact')" id="tab-contact"
                    class="tab-inactive pb-3 border-b-2 font-medium flex items-center gap-2 transition-all"><i
                        data-lucide="mail" class="w-4 h-4"></i> Contact & Skills</button>
                <button onclick="switchTab('experience')" id="tab-experience"
                    class="tab-inactive pb-3 border-b-2 font-medium flex items-center gap-2 transition-all"><i
                        data-lucide="briefcase" class="w-4 h-4"></i> Experience</button>
            </div>

            <div class="p-8 overflow-y-auto flex-1 custom-scrollbar">

                <div id="content-basic" class="block space-y-6">
                    <div
                        class="bg-slate-900/80 border border-slate-800 p-5 rounded-2xl flex items-center justify-between gap-4">
                        <div class="flex-1">
                            <label class="block text-sm text-slate-400 mb-3 flex items-center gap-2"><i
                                    data-lucide="image" class="w-4 h-4"></i> Profile Picture</label>
                            <input type="file" id="in-avatar" accept="image/*" onchange="handleImageUpload(event)"
                                class="text-sm w-full text-slate-400 file:mr-4 file:py-2.5 file:px-5 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-500 cursor-pointer transition-all">
                        </div>
                        <img id="avatar-preview"
                            class="hidden w-20 h-20 rounded-full object-cover border-2 border-slate-600 shadow-lg">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="space-y-4 bg-slate-900/40 p-6 rounded-2xl border border-blue-500/20">
                            <h3
                                class="text-blue-400 font-bold border-b border-blue-900/50 pb-2 flex items-center gap-2">
                                🇹🇭 ข้อมูลภาษาไทย</h3>
                            <div><label
                                    class="block text-xs font-semibold text-slate-400 uppercase mb-2">ชื่อ-นามสกุล</label><input
                                    type="text" id="in-name-th"
                                    class="w-full bg-slate-900 border border-slate-700 p-3.5 rounded-xl outline-none focus:border-blue-500">
                            </div>
                            <div><label
                                    class="block text-xs font-semibold text-slate-400 uppercase mb-2">ตำแหน่งงาน</label><input
                                    type="text" id="in-role-th"
                                    class="w-full bg-slate-900 border border-slate-700 p-3.5 rounded-xl outline-none focus:border-blue-500">
                            </div>
                            <div><label
                                    class="block text-xs font-semibold text-slate-400 uppercase mb-2">ประวัติโดยย่อ</label><textarea
                                    id="in-bio-th"
                                    class="w-full bg-slate-900 border border-slate-700 p-3.5 rounded-xl h-28 resize-none outline-none focus:border-blue-500"></textarea>
                            </div>
                        </div>
                        <div class="space-y-4 bg-slate-900/40 p-6 rounded-2xl border border-amber-500/20">
                            <h3
                                class="text-amber-400 font-bold border-b border-amber-900/50 pb-2 flex items-center gap-2">
                                🇬🇧 English Data</h3>
                            <div><label class="block text-xs font-semibold text-slate-400 uppercase mb-2">Full
                                    Name</label><input type="text" id="in-name-en"
                                    class="w-full bg-slate-900 border border-slate-700 p-3.5 rounded-xl outline-none focus:border-amber-500">
                            </div>
                            <div><label class="block text-xs font-semibold text-slate-400 uppercase mb-2">Job
                                    Position</label><input type="text" id="in-role-en"
                                    class="w-full bg-slate-900 border border-slate-700 p-3.5 rounded-xl outline-none focus:border-amber-500">
                            </div>
                            <div><label class="block text-xs font-semibold text-slate-400 uppercase mb-2">Professional
                                    Summary</label><textarea id="in-bio-en"
                                    class="w-full bg-slate-900 border border-slate-700 p-3.5 rounded-xl h-28 resize-none outline-none focus:border-amber-500"></textarea>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="content-contact" class="hidden space-y-6">
                    <div
                        class="grid grid-cols-1 md:grid-cols-2 gap-5 bg-slate-900/40 p-6 rounded-2xl border border-slate-700">
                        <div class="relative"><label
                                class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Email</label><input
                                type="text" id="in-email"
                                class="text-slate-200 w-full bg-slate-900 border border-slate-700 p-3.5 rounded-xl outline-none">
                        </div>
                        <div class="relative"><label
                                class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Phone</label><input
                                type="text" id="in-phone"
                                class="text-slate-200 w-full bg-slate-900 border border-slate-700 p-3.5 rounded-xl outline-none">
                        </div>
                        <div class="relative md:col-span-2"><label
                                class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">LinkedIn
                                URL</label><input type="text" id="in-linkedin"
                                class="text-slate-200 w-full bg-slate-900 border border-slate-700 p-3.5 rounded-xl outline-none">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="bg-slate-900/40 p-6 rounded-2xl border border-blue-500/20">
                            <label class="block text-xs font-semibold text-blue-400 uppercase mb-2">Skills
                                (ภาษาไทย)</label>
                            <input type="text" id="in-skills-th" placeholder="เช่น การวางแผน, การจัดการ..."
                                class="text-slate-200 w-full bg-slate-900 border border-slate-700 p-3.5 rounded-xl outline-none focus:border-blue-500">
                        </div>
                        <div class="bg-slate-900/40 p-6 rounded-2xl border border-amber-500/20">
                            <label class="block text-xs font-semibold text-amber-400 uppercase mb-2">Skills
                                (English)</label>
                            <input type="text" id="in-skills-en" placeholder="e.g. Planning, Management..."
                                class="text-slate-200 w-full bg-slate-900 border border-slate-700 p-3.5 rounded-xl outline-none focus:border-amber-500">
                        </div>
                    </div>
                </div>

                <div id="content-experience" class="hidden">
                    <div class="p-6 bg-slate-900/50 rounded-3xl border border-slate-700 mb-8">
                        <label class="block text-sm font-bold text-slate-200 mb-4 flex items-center gap-2"><i
                                data-lucide="edit-3" class="w-4 h-4 text-emerald-400"></i> <span id="exp-form-title">Add
                                / Edit Experience</span></label>

                        <div
                            class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6 bg-slate-900 p-4 rounded-xl border border-slate-800">
                            <select id="new-exp-start-month"
                                class="bg-slate-800 border border-slate-600 text-slate-200 p-3 rounded-lg outline-none">
                                <option value="">Start Month</option>
                                <option value="Jan">Jan</option>
                                <option value="Feb">Feb</option>
                                <option value="Mar">Mar</option>
                                <option value="Apr">Apr</option>
                                <option value="May">May</option>
                                <option value="Jun">Jun</option>
                                <option value="Jul">Jul</option>
                                <option value="Aug">Aug</option>
                                <option value="Sep">Sep</option>
                                <option value="Oct">Oct</option>
                                <option value="Nov">Nov</option>
                                <option value="Dec">Dec</option>
                            </select>
                            <input type="number" id="new-exp-start-year" placeholder="Start Year"
                                class="bg-slate-800 border border-slate-600 text-slate-200 p-3 rounded-lg outline-none">
                            <select id="new-exp-end-month"
                                class="bg-slate-800 border border-slate-600 text-slate-200 p-3 rounded-lg outline-none">
                                <option value="">End Month</option>
                                <option value="Jan">Jan</option>
                                <option value="Feb">Feb</option>
                                <option value="Mar">Mar</option>
                                <option value="Apr">Apr</option>
                                <option value="May">May</option>
                                <option value="Jun">Jun</option>
                                <option value="Jul">Jul</option>
                                <option value="Aug">Aug</option>
                                <option value="Sep">Sep</option>
                                <option value="Oct">Oct</option>
                                <option value="Nov">Nov</option>
                                <option value="Dec">Dec</option>
                            </select>
                            <input type="number" id="new-exp-end-year" placeholder="End Year"
                                class="bg-slate-800 border border-slate-600 text-slate-200 p-3 rounded-lg outline-none">
                            <div class="col-span-2 md:col-span-4 flex items-center gap-2 mt-1">
                                <input type="checkbox" id="new-exp-current" onchange="toggleEndDate()"
                                    class="w-4 h-4 accent-emerald-500">
                                <label for="new-exp-current" class="text-sm text-emerald-400 font-medium">I currently
                                    work here (ทำงานที่นี่ในปัจจุบัน)</label>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                            <div class="space-y-3 bg-[#0f172a] p-5 rounded-2xl border border-blue-500/20 shadow-inner">
                                <h3
                                    class="text-blue-400 font-bold border-b border-slate-700 pb-2 text-sm flex items-center gap-2">
                                    🇹🇭 ข้อมูลภาษาไทย</h3>
                                <input type="text" id="new-exp-company-th" placeholder="ชื่อบริษัท / องค์กร"
                                    class="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl outline-none focus:border-blue-500">
                                <input type="text" id="new-exp-title-th" placeholder="ตำแหน่ง / ชื่อผลงาน"
                                    class="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl outline-none focus:border-blue-500">
                                <input type="text" id="new-exp-desc-th" placeholder="รายละเอียดแบบย่อ"
                                    class="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl outline-none focus:border-blue-500">
                                <textarea id="new-exp-highlights-th"
                                    placeholder="จุดเด่น/หน้าที่ (กด Enter เพื่อขึ้นข้อใหม่)"
                                    class="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl outline-none focus:border-blue-500 h-24 resize-none text-sm"></textarea>
                            </div>
                            <div class="space-y-3 bg-[#0f172a] p-5 rounded-2xl border border-amber-500/20 shadow-inner">
                                <h3
                                    class="text-amber-400 font-bold border-b border-slate-700 pb-2 text-sm flex items-center gap-2">
                                    🇬🇧 English Data</h3>
                                <input type="text" id="new-exp-company-en" placeholder="Company / Organization"
                                    class="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl outline-none focus:border-amber-500">
                                <input type="text" id="new-exp-title-en" placeholder="Title / Role"
                                    class="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl outline-none focus:border-amber-500">
                                <input type="text" id="new-exp-desc-en" placeholder="Short description"
                                    class="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl outline-none focus:border-amber-500">
                                <textarea id="new-exp-highlights-en"
                                    placeholder="Highlights/Duties (Press Enter for new line)"
                                    class="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl outline-none focus:border-amber-500 h-24 resize-none text-sm"></textarea>
                            </div>
                        </div>

                        <div class="mb-6 bg-slate-900 p-4 rounded-xl border border-slate-800">
                            <label class="block text-xs font-semibold text-slate-400 mb-2"><i data-lucide="image"
                                    class="w-3 h-3 inline"></i> Project Images</label>
                            <input type="file" id="new-exp-img" accept="image/*" multiple
                                onchange="handleExpImageUpload(event)"
                                class="text-sm w-full text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-slate-700 file:text-white hover:file:bg-slate-600 cursor-pointer">
                            <div id="exp-img-preview"
                                class="flex gap-2 py-2 overflow-x-auto mt-2 hidden scrollbar-hide"></div>
                        </div>

                        <div class="flex gap-3">
                            <button onclick="cancelEditExp()" id="btn-cancel-exp"
                                class="hidden px-6 bg-slate-700 hover:bg-slate-600 text-white rounded-xl transition-all font-semibold">Cancel</button>
                            <button onclick="addExperience()" id="btn-add-exp"
                                class="flex-1 bg-emerald-600/20 hover:bg-emerald-600/40 text-emerald-400 border border-emerald-500/30 py-3.5 rounded-xl font-bold transition-all flex justify-center items-center gap-2"><i
                                    data-lucide="plus" class="w-5 h-5"></i> Save Experience</button>
                        </div>
                    </div>

                    <label
                        class="block text-sm font-semibold text-slate-400 uppercase tracking-wider mb-3">Timeline</label>
                    <div id="exp-list-preview" class="space-y-3"></div>
                </div>

            </div>

            <div class="p-6 border-t border-slate-800 bg-slate-900/80 flex flex-wrap justify-end gap-3 rounded-b-3xl">
                <button onclick="handleExportWeb()"
                    class="flex-1 min-w-[120px] py-3 rounded-xl font-semibold text-slate-300 hover:text-white bg-slate-800 hover:bg-slate-700 transition-all flex items-center justify-center gap-2 border border-slate-700">
                    <i data-lucide="globe" class="w-4 h-4 text-cyan-400"></i> <span class="text-sm">WEB</span>
                </button>
                <button onclick="handleExportPPTX()"
                    class="flex-1 min-w-[120px] py-3 rounded-xl font-bold text-white bg-orange-600 hover:bg-orange-500 shadow-lg shadow-orange-600/30 transition-all flex items-center justify-center gap-2 border border-orange-500">
                    <i data-lucide="file-presentation" class="w-4 h-4"></i> <span class="text-sm">PPTX</span>
                </button>
                <button onclick="handlePrint()"
                    class="flex-1 min-w-[120px] py-3 rounded-xl font-bold text-white bg-emerald-600 hover:bg-emerald-500 shadow-lg shadow-emerald-600/30 transition-all flex items-center justify-center gap-2 border border-emerald-500">
                    <i data-lucide="printer" class="w-4 h-4"></i> <span class="text-sm">PDF</span>
                </button>
                <button onclick="updatePreview()"
                    class="w-full md:w-auto px-10 py-3 rounded-xl font-bold text-white bg-blue-600 hover:bg-blue-500 shadow-lg shadow-blue-600/30 transition-all flex items-center justify-center gap-2">
                    <i data-lucide="save" class="w-5 h-5"></i> Save Profile
                </button>
            </div>
        </div>
    </div>

    <script src="js/components/Header.js"></script>
    <script src="js/components/Bio.js"></script>
    <script src="js/components/Experience.js"></script>
    <script src="js/components/Skill.js"></script>
    <script src="js/components/Contact.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/exporter.js"></script>

    <script>
        lucide.createIcons();
        let currentAvatarBase64 = "";
        let currentExpImagesBase64 = [];
        let editingExpIndex = -1;

        // 🌟 ซ่อน Theme Panel เมื่อคลิกที่อื่น
        document.addEventListener('click', (e) => {
            const panel = document.getElementById('theme-panel');
            const btn = document.getElementById('btn-appearance');
            if (!panel.classList.contains('hidden') && !panel.contains(e.target) && !btn.contains(e.target)) {
                panel.classList.add('hidden');
            }
        });

        function toggleThemePanel() {
            document.getElementById('theme-panel').classList.toggle('hidden');
        }

        // 🌟 จัดการ Layout ผ่าน Pill Toggle โดยตรง

        // 🌟 ระบบย่อรูปภาพ (Image Compression) สำหรับรูปโปรไฟล์
        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    const img = new Image();
                    img.onload = function () {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        const MAX_WIDTH = 400; // ย่อรูปโปรไฟล์ให้กว้างสุดแค่ 400px

                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        // แปลงเป็น JPEG และลดคุณภาพเหลือ 70% เพื่อประหยัดพื้นที่ 
                        currentAvatarBase64 = canvas.toDataURL('image/jpeg', 0.7);
                        document.getElementById('avatar-preview').src = currentAvatarBase64;
                        document.getElementById('avatar-preview').classList.remove('hidden');
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        // 🌟 ระบบย่อรูปภาพ (Image Compression) สำหรับรูปผลงาน (Experience)
        function handleExpImageUpload(event) {
            Array.from(event.target.files).forEach(file => {
                const reader = new FileReader();
                reader.onload = function (e) {
                    const img = new Image();
                    img.onload = function () {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        const MAX_WIDTH = 800; // ย่อรูปผลงานให้กว้างสุด 800px (ชัดพอสำหรับเว็บและ PPTX)

                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        // แปลงเป็น JPEG และลดคุณภาพเหลือ 70%
                        currentExpImagesBase64.push(canvas.toDataURL('image/jpeg', 0.7));
                        renderExpImagePreview();
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
            event.target.value = '';
        }

        function addExperience() {
            const sm = document.getElementById('new-exp-start-month').value;
            const sy = document.getElementById('new-exp-start-year').value;
            const em = document.getElementById('new-exp-end-month').value;
            const ey = document.getElementById('new-exp-end-year').value;
            const isCurrent = document.getElementById('new-exp-current').checked;

            const company_th = document.getElementById('new-exp-company-th').value;
            const title_th = document.getElementById('new-exp-title-th').value;
            const desc_th = document.getElementById('new-exp-desc-th').value;
            const hl_th = document.getElementById('new-exp-highlights-th').value.split('\n').filter(h => h.trim() !== '');

            const company_en = document.getElementById('new-exp-company-en').value;
            const title_en = document.getElementById('new-exp-title-en').value;
            const desc_en = document.getElementById('new-exp-desc-en').value;
            const hl_en = document.getElementById('new-exp-highlights-en').value.split('\n').filter(h => h.trim() !== '');

            if (!sy || (!title_th && !title_en)) return alert("Please fill at least Start Year and Title");

            const data = StorageHandler.load();
            if (!data.exp) data.exp = [];

            const expItem = {
                startMonth: sm, startYear: sy, endMonth: em, endYear: ey, isCurrent, year: sy,
                company_th, title_th, desc_th, highlights_th: hl_th,
                company_en, title_en, desc_en, highlights_en: hl_en,
                images: [...currentExpImagesBase64]
            };

            if (editingExpIndex === -1) {
                data.exp.unshift(expItem);
            } else {
                data.exp[editingExpIndex] = expItem;
            }
            StorageHandler.save(data);
            cancelEditExp();
            refreshExpPreview();
        }

        function editExp(index) {

            document.getElementById('new-exp-title-th').value = item.title_th || item.title || '';
            document.getElementById('new-exp-desc-th').value = item.desc_th || item.desc || '';

            if (document.getElementById('btn-lang')) document.getElementById('btn-lang').innerText = lang === 'th' ? 'TH' : 'EN';

            setTimeout(() => {
                lucide.createIcons();
                if (layout === 'portfolio') initScrollEffects();
            }, 50);
        }

        function initScrollEffects() {
            const revealObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('show'); });
            }, { threshold: 0.1 });
            document.querySelectorAll('.scroll-reveal').forEach(el => revealObserver.observe(el));

            const scrollyWrappers = document.querySelectorAll('.scrollytelling-wrapper');
            if (scrollyWrappers.length > 0) {
                if (window._scrollHandler) window.removeEventListener('scroll', window._scrollHandler);
                scrollyWrappers.forEach(w => { const t = w.querySelector('.scrollytelling-track'); if (t) t.removeAttribute('data-max-translate'); });

                window._scrollHandler = () => {
                    scrollyWrappers.forEach(wrapper => {
                        const track = wrapper.querySelector('.scrollytelling-track');
                        const imageWrapper = wrapper.querySelector('.cinematic-image-wrapper');
                        const stickyBox = wrapper.querySelector('.sticky');

                        if (!track || !stickyBox) return;

                        const rect = wrapper.getBoundingClientRect();
                        const stickyTop = window.innerHeight * 0.1;
                        const stickyHeight = stickyBox.offsetHeight;
                        const totalScrollDistance = rect.height - stickyHeight;

                        let progress = 0;
                        if (totalScrollDistance > 0) {
                            progress = (stickyTop - rect.top) / totalScrollDistance;
                        }
                        progress = Math.max(0, Math.min(1, progress));

                        let maxTranslate = track.getAttribute('data-max-translate');
                        if (!maxTranslate) {
                            const isCol = imageWrapper.classList.contains('cinematic-collapsed');
                            if (isCol) {
                                imageWrapper.classList.remove('cinematic-collapsed');
                                imageWrapper.classList.add('cinematic-expanded');
                            }
                            maxTranslate = track.scrollWidth - track.parentElement.clientWidth;
                            track.setAttribute('data-max-translate', maxTranslate);
                            if (isCol) {
                                imageWrapper.classList.add('cinematic-collapsed');
                                imageWrapper.classList.remove('cinematic-expanded');
                            }
                        }

                        maxTranslate = parseFloat(maxTranslate) || 0;

                        if (imageWrapper) {
                            if (progress <= 0.02 || progress >= 0.98) {
                                imageWrapper.classList.add('cinematic-collapsed');
                                imageWrapper.classList.remove('cinematic-expanded');
                            } else {
                                imageWrapper.classList.add('cinematic-expanded');
                                imageWrapper.classList.remove('cinematic-collapsed');
                            }
                        }

                        if (maxTranslate > 0) {
                            let scrollProgress = 0;
                            const startMove = 0.05;
                            const endMove = 0.85;

                            if (progress > startMove && progress < endMove) {
                                scrollProgress = (progress - startMove) / (endMove - startMove);
                            } else if (progress >= endMove) {
                                scrollProgress = 1;
                            }

                            const currentTranslate = scrollProgress * maxTranslate;
                            track.style.transform = `translateX(-${currentTranslate}px)`;
                        } else {
                            track.style.transform = `translateX(0px)`;
                        }
                    });
                };
                window.addEventListener('scroll', window._scrollHandler, { passive: true });
            }
        }

        function handlePrint() {
            toggleModal();
            setTimeout(() => window.print(), 350);
        }
